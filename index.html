<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Envases - Business Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* --- UNIFICACIÓN DE PALETA --- */
        :root {
            --color-fondo: #2c3e50;
            --color-primario: #34495e;
            --color-acento: #2ecc71;
            --color-azul: #2980b9;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--color-fondo);
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }

        .container {
            width: 100%; max-width: 500px; background: var(--blanco); padding: 25px;
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); color: #333;
        }

        /* BARRA SUPERIOR IGUAL A LA PRIMERA APP */
        .top-bar {
            display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 10px;
        }

        .icon-btn { 
            background: none; border: none; font-size: 20px; 
            color: #bdc3c7; cursor: pointer; transition: 0.3s;
        }
        .icon-btn:hover { color: var(--color-azul); transform: scale(1.1); }

        h2 { text-align: center; color: var(--color-primario); margin-top: 0; font-weight: 800; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: var(--color-azul); text-transform: uppercase; margin-bottom: 5px; }

        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--color-acento); }

        .btn-registrar {
            width: 100%; padding: 15px; background-color: var(--color-acento); color: white;
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        .loan-card {
            background: #f8f9fa; border-left: 5px solid var(--color-azul);
            padding: 15px; border-radius: 10px; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .loan-qty { font-size: 1.2rem; font-weight: 900; color: var(--color-acento); }
        .btn-devolver { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button class="icon-btn" onclick="exportarDatos()" title="Exportar Historial"><i class="fa-solid fa-cloud-arrow-down"></i></button>
        <button class="icon-btn" onclick="document.getElementById('importFile').click()" title="Importar Historial"><i class="fa-solid fa-gear"></i></button>
    </div>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importarDatos(event)">

    <h2>🍼 Préstamo de Envases</h2>
    
    <div class="form-group">
        <label>Cliente / Nombre:</label>
        <input type="text" id="nombreCliente" placeholder="¿A quién le prestas?">
    </div>

    <div class="form-group">
        <label>Cantidad:</label>
        <input type="number" id="cantidadEnvase" value="1">
    </div>

    <div class="form-group">
        <label>Tipo de Envase:</label>
        <select id="tipoEnvase">
            <option value="Refresco 2.5L">Refresco 2.5L</option>
            <option value="Cerveza Mega">Cerveza Mega</option>
            <option value="Garrafón">Garrafón</option>
        </select>
    </div>

    <button class="btn-registrar" onclick="registrarPrestamo()">Registrar Préstamo</button>

    <div id="listaPrestamos"></div>
</div>

<script>
    let prestamos = JSON.parse(localStorage.getItem('prestamos_envases')) || [];

    function registrarPrestamo() {
        const nombre = document.getElementById('nombreCliente').value;
        const cant = document.getElementById('cantidadEnvase').value;
        const tipo = document.getElementById('tipoEnvase').value;
        if(!nombre) return alert("Escribe un nombre");
        prestamos.push({ nombre, cant, tipo, fecha: new Date().toLocaleDateString() });
        actualizarStorage();
        limpiar();
    }

    function renderPrestamos() {
        const div = document.getElementById('listaPrestamos');
        div.innerHTML = prestamos.map((p, i) => `
            <div class="loan-card">
                <div><b>${p.nombre}</b><br><small>${p.tipo} - ${p.fecha}</small></div>
                <div class="loan-qty">${p.cant}</div>
                <button class="btn-devolver" onclick="devolver(${i})">✕</button>
            </div>
        `).join('');
    }

    function devolver(i) { prestamos.splice(i, 1); actualizarStorage(); }
    function actualizarStorage() { localStorage.setItem('prestamos_envases', JSON.stringify(prestamos)); renderPrestamos(); }
    function limpiar() { document.getElementById('nombreCliente').value = ""; document.getElementById('nombreCliente').focus(); }

    // FUNCIONES DE IMPORTAR / EXPORTAR (Formato JSON para no perder datos)
    function exportarDatos() {
        if(prestamos.length === 0) return alert("No hay datos para exportar");
        const blob = new Blob([JSON.stringify(prestamos)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Historial_Envases.json`;
        a.click();
    }

    function importarDatos(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                prestamos = JSON.parse(e.target.result);
                actualizarStorage();
                alert("Historial importado correctamente");
            } catch(err) { alert("Archivo no válido"); }
        };
        reader.readAsText(file);
    }

    renderPrestamos();
</script>
</body>
</html>
