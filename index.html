<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Envases - Business Pro</title>
    <style>
        /* --- UNIFICACIÓN DE PALETA --- */
        :root {
            --color-fondo: #2c3e50;      /* Gris Azulado Oscuro */
            --color-primario: #34495e;   /* Azul Grisáceo */
            --color-acento: #2ecc71;     /* Verde Esmeralda */
            --color-azul: #2980b9;       /* Azul Rey */
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--color-fondo);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: var(--blanco);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--blanco);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #333;
        }

        h2 { 
            text-align: center; 
            color: var(--color-primario); 
            margin-top: 0;
            font-weight: 800;
        }

        /* --- FORMULARIO --- */
        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: bold; 
            color: var(--color-azul); 
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--color-acento); }

        .btn-registrar {
            width: 100%;
            padding: 15px;
            background-color: var(--color-acento);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-registrar:hover { background-color: #27ae60; }

        /* --- LISTADO DE PRÉSTAMOS --- */
        .loan-card {
            background: #f8f9fa;
            border-left: 5px solid var(--color-azul);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loan-info b { color: var(--color-primario); }
        .loan-qty { 
            font-size: 1.2rem; 
            font-weight: 900; 
            color: var(--color-acento); 
        }

        .btn-devolver {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍼 Préstamo de Envases</h2>
    
    <div class="form-group">
        <label>Cliente / Nombre:</label>
        <input type="text" id="nombreCliente" placeholder="¿A quién le prestas?">
    </div>

    <div class="form-group">
        <label>Cantidad de Envases:</label>
        <input type="number" id="cantidadEnvase" value="1">
    </div>

    <div class="form-group">
        <label>Tipo de Envase:</label>
        <select id="tipoEnvase">
            <option value="Refresco 2.5L">Refresco 2.5L</option>
            <option value="Cerveza Mega">Cerveza Mega</option>
            <option value="Garrafón">Garrafón</option>
        </select>
    </div>

    <button class="btn-registrar" onclick="registrarPrestamo()">Registrar Préstamo</button>

    <div id="listaPrestamos">
        </div>
</div>

<script>
    let prestamos = JSON.parse(localStorage.getItem('prestamos_envases')) || [];

    function registrarPrestamo() {
        const nombre = document.getElementById('nombreCliente').value;
        const cant = document.getElementById('cantidadEnvase').value;
        const tipo = document.getElementById('tipoEnvase').value;

        if(!nombre) return alert("Escribe un nombre");

        prestamos.push({ nombre, cant, tipo, fecha: new Date().toLocaleDateString() });
        actualizarStorage();
        limpiar();
    }

    function renderPrestamos() {
        const div = document.getElementById('listaPrestamos');
        div.innerHTML = prestamos.map((p, i) => `
            <div class="loan-card">
                <div class="loan-info">
                    <b>${p.nombre}</b><br>
                    <small>${p.tipo} - ${p.fecha}</small>
                </div>
                <div class="loan-qty">${p.cant}</div>
                <button class="btn-devolver" onclick="devolver(${i})">✕</button>
            </div>
        `).join('');
    }

    function devolver(i) {
        prestamos.splice(i, 1);
        actualizarStorage();
    }

    function actualizarStorage() {
        localStorage.setItem('prestamos_envases', JSON.stringify(prestamos));
        renderPrestamos();
    }

    function limpiar() {
        document.getElementById('nombreCliente').value = "";
        document.getElementById('cantidadEnvase').value = "1";
        document.getElementById('nombreCliente').focus();
    }

    renderPrestamos();
</script>

</body>
</html>
